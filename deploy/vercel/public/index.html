<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cc-wake</title>
<style>
  :root{
    --bg:#fff; --fg:#333; --strong:#111; --muted:#888; --faint:#aaa;
    --line:#e6e6e6; --line2:#f0f0f0; --link:#0453c6; --ok:#1a7f37; --warn:#b91c1c; --amber:#9a6a00;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#0f0f10;--fg:#c9c9c9;--strong:#f0f0f0;--muted:#7f7f83;--faint:#5a5a5f;
      --line:#242427;--line2:#1b1b1e;--link:#6aa3ff;--ok:#3fb950;--warn:#f0603a;--amber:#d0a24a;}
  }
  *{box-sizing:border-box}
  body{max-width:760px;margin:38px auto;padding:0 18px;background:var(--bg);color:var(--fg);
    font:400 13.5px/1.55 var(--mono);-webkit-font-smoothing:antialiased}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:20px}
  h1{font-size:16px;font-weight:700;color:var(--strong);margin:0;letter-spacing:.02em}
  h1 .dim{color:var(--faint);font-weight:400}
  .meta{font-size:12px;color:var(--muted)}
  .row{display:flex;align-items:center;gap:12px;padding:11px 2px;border-bottom:1px solid var(--line2)}
  .dot{width:8px;height:8px;border-radius:50%;flex:none;background:var(--faint)}
  .dot.working{background:var(--ok);box-shadow:0 0 0 3px color-mix(in srgb,var(--ok) 22%,transparent)}
  .dot.waiting{background:var(--amber)}
  .main{flex:1;min-width:0}
  .label{color:var(--strong);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sub{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .actions{display:flex;gap:6px;flex:none}
  .btn{font:600 11px var(--mono);color:var(--fg);background:transparent;border:1px solid var(--line);
    padding:4px 9px;border-radius:5px;cursor:pointer;text-decoration:none;white-space:nowrap}
  .btn:hover:not(:disabled){border-color:var(--strong);color:var(--strong)}
  .btn.soft{color:var(--faint);border-color:var(--line2)}
  .btn:disabled{opacity:.4;cursor:default}
  .empty{color:var(--muted);padding:40px 0;text-align:center}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--strong);color:var(--bg);
    font-size:12px;padding:8px 14px;border-radius:6px;opacity:0;transition:opacity .2s;pointer-events:none}
  #toast.on{opacity:.95}
  .foot{margin-top:24px;font-size:11px;color:var(--faint)}
  a{color:var(--link)}
</style>
</head>
<body>
<header>
  <h1>cc<span class="dim">-</span>wake <span class="dim" id="count"></span></h1>
  <div class="meta" id="meta">connecting…</div>
</header>
<div id="list"></div>
<div class="foot" id="foot"></div>
<div id="toast"></div>
<script>
const $ = s => document.querySelector(s);
let CAP = {actions: [], needs_token: false};

function tokenHeader(){
  const t = localStorage.getItem("ccwake_token") || "";
  return t ? {"X-CCWake-Token": t} : {};
}
function fmtAge(ms){
  const s = Math.max(0, Math.round(ms/1000));
  if (s < 60) return s + "s"; if (s < 3600) return Math.round(s/60) + "m"; return Math.round(s/3600) + "h";
}
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("on"); setTimeout(()=>t.classList.remove("on"),1600); }

async function command(action, sid){
  try{
    const r = await fetch("/api/command", {method:"POST",
      headers:{"Content-Type":"application/json", ...tokenHeader()},
      body: JSON.stringify({action, session_id: sid})});
    if (r.status === 401){
      const t = prompt("Control token:");
      if (t){ localStorage.setItem("ccwake_token", t); return command(action, sid); }
      return;
    }
    const j = await r.json();
    toast(j.ok ? (action === "focus" ? "Focusing tab…" : "Enabling RC…") : ("Refused: " + (j.err||"")));
  }catch(e){ toast("Request failed"); }
}

function row(s){
  const el = document.createElement("div"); el.className = "row";
  const bits = [s.cwd || ""];
  if (s.model) bits.push(s.model);
  if (s.context_pct != null) bits.push("ctx " + s.context_pct + "%");
  el.innerHTML =
    `<div class="dot ${s.state}"></div>
     <div class="main">
       <div class="label"></div>
       <div class="sub"></div>
     </div>
     <div class="actions"></div>`;
  el.querySelector(".label").textContent = s.label || s.id.slice(0,8);
  el.querySelector(".sub").textContent = bits.filter(Boolean).join("  ·  ");
  const acts = el.querySelector(".actions");
  if (s.focusable && CAP.actions.includes("focus")){
    const b = document.createElement("button"); b.className="btn"; b.textContent="→ tab";
    b.onclick = () => command("focus", s.id); acts.appendChild(b);
  }
  if (s.rc_url){
    const a = document.createElement("a"); a.className="btn"; a.href=s.rc_url; a.target="_blank";
    a.rel="noopener"; a.textContent="↗ web"; acts.appendChild(a);
  } else if (CAP.actions.includes("enable_rc")){
    const b = document.createElement("button"); b.className="btn soft"; b.textContent="enable RC";
    b.title="Turn on Remote Control (runs /remote-control on the host)";
    b.onclick = () => { if (confirm("Enable Remote Control on “"+(s.label||s.id.slice(0,8))+"”?")) command("enable_rc", s.id); };
    acts.appendChild(b);
  }
  return el;
}

function render(snap){
  CAP = {actions: snap.actions || [], needs_token: snap.needs_token};
  const sessions = snap.sessions || [];
  $("#count").textContent = sessions.length ? sessions.length + " sessions" : "";
  $("#meta").textContent = snap.ts ? ("updated " + fmtAge(Date.now()-snap.ts) + " ago") : "offline";
  const list = $("#list"); list.innerHTML = "";
  if (!sessions.length){ list.innerHTML = '<div class="empty">no Claude Code sessions found</div>'; }
  else sessions.forEach(s => list.appendChild(row(s)));
  $("#foot").textContent = CAP.actions.length
    ? ("control: " + CAP.actions.join(", "))
    : "read-only (control disabled on this host)";
}

async function tick(){
  try{
    const r = await fetch("/api/snapshot", {headers: tokenHeader()});
    if (r.status === 401){
      const t = prompt("Access token:");
      if (t){ localStorage.setItem("ccwake_token", t); return tick(); }
      $("#meta").textContent = "locked"; return;
    }
    render(await r.json());
  }catch(e){ $("#meta").textContent = "disconnected"; }
}
tick(); setInterval(tick, 3000);
</script>
</body>
</html>
